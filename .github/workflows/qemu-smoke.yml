name: QEMU Smoke Tests

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "QEMU image Release tag"
        required: true
        default: "v20260717"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/qemu-smoke.yml"
      - "ci/ohos-test-runner-smoke/**"
      - "ci/qemu-smoke/**"
      - "scripts/install.sh"
      - "scripts/package_standard_qemu.sh"
  pull_request:
    paths:
      - ".github/workflows/qemu-smoke.yml"
      - "ci/ohos-test-runner-smoke/**"
      - "ci/qemu-smoke/**"
      - "scripts/install.sh"
      - "scripts/package_standard_qemu.sh"

permissions:
  contents: read

concurrency:
  group: qemu-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    env:
      QEMU_SMOKE_PACKAGE: ${{ matrix.package }}
      QEMU_SMOKE_GUEST_ARCH: ${{ matrix.guest_arch }}
      QEMU_SMOKE_HOST_PLATFORM: ${{ matrix.host_platform }}
      QEMU_SMOKE_REQUIRE_ACCOUNT: ${{ matrix.require_account }}
      QEMU_SMOKE_REQUIRE_KVM: ${{ matrix.require_kvm }}
      QEMU_SMOKE_RUN_OHOS_RUNNER: ${{ matrix.run_ohos_runner }}
      QEMU_SMOKE_ACCOUNT_WAIT_ATTEMPTS: ${{ matrix.account_wait_attempts }}
      QEMU_SMOKE_MINIMUM_GUEST_UPTIME: ${{ matrix.minimum_guest_uptime }}
      QEMU_SMOKE_ACCEL: ${{ matrix.accel }}
      QEMU_RELEASE_TAG: ${{ inputs.release_tag || 'v20260717' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64 QEMU
            runner: ubuntu-22.04
            host_platform: linux
            guest_arch: x86_64
            package: artifacts/openharmony-qemu-x86_64-x86_64_virt.tar.gz
            sdk_version: "6.1"
            sdk_components: "native;toolchains"
            require_account: "true"
            require_kvm: "true"
            account_wait_attempts: "300"
            run_ohos_runner: "true"
            minimum_guest_uptime: "0"
            accel: "auto"
          - name: macOS arm64 QEMU
            runner: macos-14
            host_platform: macos
            guest_arch: aarch64
            package: artifacts/openharmony-qemu-arm64-arm64_virt.tar.gz
            sdk_version: "6.1"
            sdk_components: "native;toolchains"
            require_account: "true"
            require_kvm: "false"
            account_wait_attempts: "240"
            run_ohos_runner: "true"
            minimum_guest_uptime: "0"
            # GitHub-hosted Apple Silicon runners do not support nested HVF.
            accel: "tcg"
          - name: macOS armv7a QEMU
            runner: macos-14
            host_platform: macos
            guest_arch: armv7a
            package: artifacts/openharmony-qemu-armv7a-armv7a_virt.tar.gz
            sdk_version: "6.1"
            sdk_components: "native;toolchains"
            require_account: "false"
            require_kvm: "false"
            account_wait_attempts: "1"
            run_ohos_runner: "false"
            minimum_guest_uptime: "270"
            accel: "auto"
          - name: Windows x64 QEMU
            runner: windows-2022
            host_platform: windows
            guest_arch: x86_64
            package: artifacts/openharmony-qemu-x86_64-x86_64_virt.tar.gz
            sdk_version: "6.1"
            sdk_components: "native;toolchains"
            require_account: "true"
            require_kvm: "false"
            account_wait_attempts: "300"
            run_ohos_runner: "true"
            minimum_guest_uptime: "0"
            accel: "tcg"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Test QEMU smoke scripts
        if: ${{ runner.os == 'Linux' }}
        shell: bash
        run: bash ci/qemu-smoke/test.sh

      - name: Download QEMU package from Release
        shell: bash
        run: |
          set -euo pipefail
          package="${{ matrix.package }}"
          asset="$(basename "${package}")"
          url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${QEMU_RELEASE_TAG}/${asset}"

          mkdir -p "$(dirname "${package}")"
          curl --fail --location \
            --retry 5 --retry-delay 2 --retry-all-errors \
            --output "${package}" "${url}"

          gzip -t "${package}"
          ls -lh "${package}"

      - name: Setup OpenHarmony SDK
        uses: openharmony-rs/setup-ohos-sdk@v1.0.0
        with:
          version: ${{ matrix.sdk_version }}
          components: ${{ matrix.sdk_components }}
          cache: true
          mirror: true

      - name: Install QEMU on Linux
        if: ${{ runner.os == 'Linux' }}
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            file \
            qemu-system-x86 \
            unzip

          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm || true

          if [[ ! -c /dev/kvm ]]; then
            echo "::error::This runner does not expose /dev/kvm; the full system test must not fall back to TCG."
            exit 1
          fi
          test -r /dev/kvm && test -w /dev/kvm
          qemu-system-x86_64 -accel help | tee /tmp/qemu-accelerators.txt
          grep -qw kvm /tmp/qemu-accelerators.txt
          ls -l /dev/kvm

      - name: Install QEMU on macOS
        if: ${{ runner.os == 'macOS' }}
        shell: bash
        run: |
          set -euo pipefail
          brew update
          brew install qemu

      - name: Install QEMU on Windows
        if: ${{ runner.os == 'Windows' }}
        shell: pwsh
        run: |
          choco install qemu -y --no-progress
          "C:\Program Files\qemu" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Prepare QEMU smoke workspace
        shell: bash
        run: bash ci/qemu-smoke/phase.sh prepare

      - name: Start QEMU
        shell: bash
        run: bash ci/qemu-smoke/phase.sh start

      - name: Wait for HDC
        shell: bash
        run: bash ci/qemu-smoke/phase.sh wait-hdc

      - name: Wait for AccountMgr foreground user
        if: ${{ matrix.require_account == 'true' }}
        shell: bash
        run: bash ci/qemu-smoke/phase.sh wait-account

      - name: Transfer and execute Rust binary
        shell: bash
        run: bash ci/qemu-smoke/phase.sh run-binary

      - name: Run ohos-test-runner Cargo smoke
        if: ${{ matrix.run_ohos_runner == 'true' }}
        shell: bash
        run: bash ci/qemu-smoke/phase.sh run-ohos-runner

      - name: Verify delayed guest stability
        if: ${{ matrix.minimum_guest_uptime != '0' }}
        shell: bash
        run: bash ci/qemu-smoke/phase.sh wait-stable

      - name: Collect QEMU diagnostics
        if: ${{ always() }}
        shell: bash
        run: bash ci/qemu-smoke/phase.sh diagnostics

      - name: Stop QEMU
        if: ${{ always() }}
        shell: bash
        run: bash ci/qemu-smoke/phase.sh cleanup

      - name: Upload QEMU diagnostics
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: qemu-diagnostics-${{ matrix.host_platform }}-${{ matrix.guest_arch }}
          if-no-files-found: warn
          retention-days: 7
          path: |
            ${{ runner.temp }}/ohos-qemu-smoke-${{ matrix.host_platform }}-${{ matrix.guest_arch }}/qemu.log
            ${{ runner.temp }}/ohos-qemu-smoke-${{ matrix.host_platform }}-${{ matrix.guest_arch }}/diagnostics/**
