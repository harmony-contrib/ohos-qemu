name: Build OpenHarmony Standard QEMU Images

on:
  workflow_dispatch:
    inputs:
      product:
        description: "Product to build"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - x86_64_virt
          - arm64_virt
          - qemu-arm64-linux-min
      manifest_url:
        description: "OpenHarmony manifest repository"
        required: true
        default: "https://gitee.com/openharmony/manifest.git"
      manifest_branch:
        description: "OpenHarmony manifest branch or tag"
        required: true
        default: "master"
      repo_jobs:
        description: "repo sync parallelism"
        required: true
        default: "8"
      build_jobs:
        description: "OpenHarmony build parallelism"
        required: true
        default: "8"
      upload_retention_days:
        description: "Artifact retention days"
        required: true
        default: "7"
      runner:
        description: "GitHub runner label. Use a self-hosted Linux runner for real full builds."
        required: true
        default: "ubuntu-22.04"
      build_pc_uefi:
        description: "Also build experimental x86_64 PC UEFI disk image when x86_64_virt is selected"
        required: true
        default: false
        type: boolean
      pc_disk_size:
        description: "Experimental PC UEFI raw disk size"
        required: true
        default: "32G"

permissions:
  contents: read

concurrency:
  group: ohos-qemu-${{ github.ref }}-${{ inputs.product || 'manual' }}
  cancel-in-progress: false

jobs:
  build:
    name: Build and package ${{ inputs.product }}
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 720

    env:
      OHOS_ROOT: ${{ github.workspace }}/openharmony
      PACKAGE_OUT: ${{ github.workspace }}/qemu-packages
      PC_IMAGE_OUT: ${{ github.workspace }}/pc-images
      CCACHE_DIR: ${{ github.workspace }}/.ccache

    steps:
      - name: Checkout packaging repository
        uses: actions/checkout@v4

      - name: Free runner disk space
        shell: bash
        run: |
          set -euo pipefail
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL || true
          df -h

      - name: Install host dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            autoconf \
            bison \
            build-essential \
            ccache \
            curl \
            default-jdk \
            dosfstools \
            flex \
            gcc-arm-linux-gnueabi \
            gcc-arm-none-eabi \
            genext2fs \
            gdisk \
            git \
            git-lfs \
            gnupg \
            grub-efi-amd64-bin \
            libboost-all-dev \
            libglib2.0-dev \
            liblz4-tool \
            libpixman-1-dev \
            libssl-dev \
            libtinfo5 \
            mtd-utils \
            mtools \
            openssl \
            ovmf \
            parted \
            pkg-config \
            python3 \
            python3-pip \
            python3-setuptools \
            qemu-system-x86 \
            qemu-utils \
            repo \
            ruby \
            scons \
            unzip \
            u-boot-tools \
            xz-utils \
            zip \
            zlib1g-dev

      - name: Configure ccache
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${CCACHE_DIR}"
          ccache --set-config=max_size=20G
          ccache --zero-stats

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ runner.os }}-${{ inputs.manifest_branch }}-${{ inputs.product }}-${{ github.run_id }}
          restore-keys: |
            ccache-${{ runner.os }}-${{ inputs.manifest_branch }}-${{ inputs.product }}-
            ccache-${{ runner.os }}-${{ inputs.manifest_branch }}-

      - name: Resolve product list
        id: products
        shell: bash
        run: |
          set -euo pipefail
          case "${{ inputs.product }}" in
            all)
              products="qemu-arm64-linux-min x86_64_virt arm64_virt"
              ;;
            x86_64_virt|arm64_virt|qemu-arm64-linux-min)
              products="${{ inputs.product }}"
              ;;
            *)
              echo "unsupported product: ${{ inputs.product }}" >&2
              exit 2
              ;;
          esac
          echo "list=${products}" >> "${GITHUB_OUTPUT}"
          printf 'Products: %s\n' "${products}"

      - name: Resolve artifact name
        id: artifact
        shell: bash
        run: |
          set -euo pipefail
          safe_branch="$(printf '%s' '${{ inputs.manifest_branch }}' | tr -c 'A-Za-z0-9._-' '-')"
          safe_product="$(printf '%s' '${{ inputs.product }}' | tr -c 'A-Za-z0-9._-' '-')"
          echo "name=openharmony-standard-qemu-${safe_product}-${safe_branch}-${GITHUB_RUN_ID}" >> "${GITHUB_OUTPUT}"

      - name: Sync OpenHarmony source
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${OHOS_ROOT}"
          cd "${OHOS_ROOT}"
          repo init \
            -u "${{ inputs.manifest_url }}" \
            -b "${{ inputs.manifest_branch }}" \
            -g ohos:standard
          repo sync -c --no-tags --optimized-fetch -j"${{ inputs.repo_jobs }}"

      - name: Download OpenHarmony prebuilts
        shell: bash
        run: |
          set -euo pipefail
          cd "${OHOS_ROOT}"
          ./build/prebuilts_download.sh

      - name: Build selected products
        shell: bash
        run: |
          set -euo pipefail
          cd "${OHOS_ROOT}"
          ulimit -n 4096 || true
          for product in ${{ steps.products.outputs.list }}; do
            echo "::group::Build ${product}"
            ./build.sh \
              --product-name "${product}" \
              --ccache \
              --jobs "${{ inputs.build_jobs }}"
            echo "::endgroup::"
          done

      - name: Package QEMU images
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${PACKAGE_OUT}"
          for product in ${{ steps.products.outputs.list }}; do
            echo "::group::Package ${product}"
            "${GITHUB_WORKSPACE}/scripts/package_standard_qemu.sh" \
              --source-root "${OHOS_ROOT}" \
              --product "${product}" \
              --output-dir "${PACKAGE_OUT}"
            echo "::endgroup::"
          done
          find "${PACKAGE_OUT}" -maxdepth 2 -type f \( -name '*.tar.gz' -o -name '*.zip' \) -print

      - name: Build experimental PC UEFI disk image
        if: ${{ inputs.build_pc_uefi && (inputs.product == 'all' || inputs.product == 'x86_64_virt') }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${PC_IMAGE_OUT}"
          sudo modprobe loop || true
          "${GITHUB_WORKSPACE}/scripts/make_pc_uefi_disk.sh" \
            --source-root "${OHOS_ROOT}" \
            --product x86_64_virt \
            --output "${PC_IMAGE_OUT}/openharmony-pc-x86_64.img" \
            --disk-size "${{ inputs.pc_disk_size }}"
          find "${PC_IMAGE_OUT}" -maxdepth 1 -type f -print

      - name: Show ccache stats
        if: always()
        shell: bash
        run: ccache --show-stats || true

      - name: Upload QEMU packages
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: |
            ${{ env.PACKAGE_OUT }}/*.tar.gz
            ${{ env.PACKAGE_OUT }}/*.zip
            ${{ env.PC_IMAGE_OUT }}/*.qcow2
            ${{ env.PC_IMAGE_OUT }}/*.manifest.json
            ${{ env.PC_IMAGE_OUT }}/*.qemu-smoke.log
          if-no-files-found: error
          retention-days: ${{ fromJSON(inputs.upload_retention_days) }}
